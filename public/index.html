<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d3b4c">
    <meta name="description" content="World news raccoglie notizie globali filtrabili per categoria, paese e lingua.">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>World news</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1 class="app-title">news dal mondo</h1>
        <div class="top-actions">
          <button class="icon-button" id="refreshButton" type="button" title="Aggiorna" aria-label="Aggiorna">&#8635;</button>
          <button class="install-button" id="installButton" type="button" hidden>Installa</button>
        </div>
      </header>

      <main>
        <section class="controls" aria-label="Filtri notizie">
          <label>
            <span>Cerca</span>
            <input id="searchInput" type="search" placeholder="Parola chiave, fonte, citta">
          </label>
          <label>
            <span>Categoria</span>
            <select id="categorySelect"></select>
          </label>
          <label>
            <span>Paese</span>
            <select id="countrySelect"></select>
          </label>
          <label>
            <span>Lingua</span>
            <select id="languageSelect">
              <option value="it">Italiano</option>
              <option value="en">English</option>
            </select>
          </label>
        </section>

        <section class="status-row">
          <div>
            <strong id="resultCount">Notizie</strong>
            <span id="statusText">Raccolgo le ultime storie disponibili.</span>
          </div>
          <button class="ghost-button" id="favoritesToggle" type="button">Preferiti</button>
        </section>

        <section class="news-grid" id="newsGrid" aria-live="polite"></section>
      </main>
    </div>

    <template id="articleTemplate">
      <article class="article-card">
        <a class="article-image-link" target="_blank" rel="noopener noreferrer">
          <img alt="" loading="lazy">
        </a>
        <div class="article-body">
          <div class="article-meta"></div>
          <h2><a target="_blank" rel="noopener noreferrer"></a></h2>
          <p></p>
          <div class="article-actions">
            <a class="read-link" target="_blank" rel="noopener noreferrer">Leggi</a>
            <button class="save-button" type="button">Salva</button>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
